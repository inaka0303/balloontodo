<style>
:root{
  --red:#e8433f; --red-deep:#c22f2c; --red-dark:#9c1f1d;
  --sun:#ffb13d; --sun-deep:#e08f1f;
  --ink:#274357; --ink-soft:rgba(39,67,87,.62);
  --paper:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
  color:var(--ink);
  background:linear-gradient(to bottom,#8fd0f5 0%,#bfe6fb 55%,#e8f7ff 100%);
  transition:background 2s ease;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
body.dawn{background:linear-gradient(to bottom,#8aa6d6 0%,#f2b7a0 60%,#ffe3c2 100%)}
body.dusk{background:linear-gradient(to bottom,#6f7ec4 0%,#f0977f 62%,#ffd9a8 100%)}
body.night{background:linear-gradient(to bottom,#1d2a4d 0%,#2e4468 60%,#46618c 100%)}
body.night{--ink:#eaf2ff;--ink-soft:rgba(234,242,255,.65)}

/* ------- clouds ------- */
.cloud{position:fixed;pointer-events:none;filter:blur(2px);opacity:.85;z-index:0}
.cloud i{position:absolute;background:#fff;border-radius:50%}
body.night .cloud{opacity:.18}
@keyframes drift{from{transform:translateX(-30vw)}to{transform:translateX(115vw)}}

/* ------- header ------- */
header{
  position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:calc(10px + env(safe-area-inset-top)) 18px 6px;
  pointer-events:none;
}
header .date{font-size:15px;font-weight:700;letter-spacing:.04em}
header .headerRight{display:flex;align-items:center;gap:8px;pointer-events:auto}
header .count{font-size:13px;font-weight:700;color:var(--ink-soft)}
header .count b{font-size:19px;color:var(--ink);margin:0 2px}
.sync-btn{
  border:none;border-radius:99px;padding:6px 10px;
  background:rgba(255,255,255,.58);color:var(--ink);
  font-size:12px;font-weight:700;font-family:inherit;white-space:nowrap;
  box-shadow:0 2px 8px rgba(30,60,90,.12);cursor:pointer;
  backdrop-filter:blur(8px);
}
.sync-btn.ready{background:rgba(255,255,255,.82)}
.sync-btn.busy{background:#fff1c7;color:#795b13}
.sync-btn.error{background:#ffe1df;color:var(--red-dark)}
body.night .sync-btn{background:rgba(20,35,60,.64);color:var(--ink)}
.login-nudge{
  position:fixed;top:calc(50px + env(safe-area-inset-top));left:50%;z-index:6;
  transform:translate(-50%,-8px);opacity:0;pointer-events:none;
  width:min(420px,calc(100vw - 28px));border-radius:18px;padding:10px 12px;
  background:rgba(255,255,255,.84);color:#274357;
  box-shadow:0 8px 22px rgba(30,60,90,.16);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  transition:opacity .25s ease,transform .25s ease;
  backdrop-filter:blur(10px);
}
.login-nudge.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.login-nudge span{font-size:12px;font-weight:700;line-height:1.45}
.login-nudge button{
  flex:none;border:none;border-radius:99px;padding:7px 11px;
  background:var(--red);color:#fff;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;box-shadow:0 3px 10px rgba(200,50,50,.25);
}
body.night .login-nudge{background:rgba(24,38,62,.9);color:#eaf2ff}

/* ------- sky (balloon field) ------- */
#sky{position:fixed;inset:0;z-index:1}

/* ------- balloon ------- */
.balloon{
  position:absolute;width:calc(var(--d)*1px);
  transform:translate(-50%,-50%);
  animation:bob var(--dur) ease-in-out var(--delay) infinite alternate;
  cursor:pointer;z-index:2;
}
@keyframes bob{
  from{transform:translate(-50%,-52%) rotate(-2.2deg)}
  to{transform:translate(-50%,-47%) rotate(2.2deg)}
}
.balloon .body{
  position:relative;width:calc(var(--d)*1px);height:calc(var(--d)*1.16px);
  border-radius:48% 48% 46% 46%/54% 54% 44% 44%;
  background:radial-gradient(circle at 32% 26%,var(--hl) 0%,var(--c1) 42%,var(--c2) 100%);
  box-shadow:inset -6px -10px 18px rgba(0,0,0,.14), 0 calc(var(--d)*.06px) calc(var(--d)*.2px) rgba(30,60,90,.18);
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease;
}
.balloon:active .body{transform:scale(1.07)}
.balloon .body::after{ /* knot */
  content:"";position:absolute;left:50%;bottom:calc(var(--d)*-.055px);
  transform:translateX(-50%);
  border-left:calc(var(--d)*.055px) solid transparent;
  border-right:calc(var(--d)*.055px) solid transparent;
  border-bottom:calc(var(--d)*.075px) solid var(--c2);
}
.balloon .string{
  position:absolute;left:50%;top:calc(var(--d)*1.2px);
  width:22px;height:calc(var(--d)*.6px);transform:translateX(-50%);
  overflow:visible;pointer-events:none;
}
.balloon .string path{fill:none;stroke:var(--c2);stroke-width:1.6;opacity:.8}
.balloon .title{
  font-weight:700;color:#fff;text-align:center;line-height:1.25;
  font-size:calc(var(--d)*.148px);
  padding:0 calc(var(--d)*.12px);
  text-shadow:0 1px 3px rgba(0,0,0,.28);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  word-break:break-all;
}
.balloon .due{
  position:absolute;top:calc(var(--d)*1.22px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:11px;font-weight:700;color:var(--ink-soft);
  background:rgba(255,255,255,.55);border-radius:99px;padding:1px 8px;
  backdrop-filter:blur(2px);
}
body.night .balloon .due{background:rgba(20,35,60,.5)}
.balloon.overdue .body{animation:throb 1.1s ease-in-out infinite}
@keyframes throb{0%,100%{filter:none}50%{filter:brightness(1.18) saturate(1.25)}}
.balloon.overdue .due{background:var(--red-dark);color:#fff}

/* pop fragments */
.frag{position:absolute;width:12px;height:12px;border-radius:60% 40% 55% 45%;
  z-index:6;pointer-events:none;
  transition:transform .55s cubic-bezier(.15,.7,.3,1),opacity .55s ease}
.confetti{
  position:fixed;z-index:8;pointer-events:none;
  width:9px;height:13px;border-radius:2px;
  box-shadow:0 1px 3px rgba(0,0,0,.12);
  transition:transform .9s cubic-bezier(.12,.72,.24,1),opacity .9s ease;
  will-change:transform,opacity;
}
.confetti.star{
  width:14px;height:14px;border-radius:50%;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
}
.confetti.ribbon{width:6px;height:20px;border-radius:99px}
.popword{position:absolute;z-index:7;pointer-events:none;font-weight:700;
  color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);font-size:22px;
  transform:translate(-50%,-50%);animation:popword .6s ease forwards}
@keyframes popword{from{opacity:1;transform:translate(-50%,-50%) scale(.6)}
  to{opacity:0;transform:translate(-50%,-120%) scale(1.4)}}

/* ------- empty state ------- */
#empty{
  position:fixed;inset:0;display:none;flex-direction:column;gap:10px;
  align-items:center;justify-content:center;z-index:1;text-align:center;
  color:var(--ink-soft);font-weight:700;padding:0 30px;
}
#empty .big{font-size:46px;animation:bob 3s ease-in-out infinite alternate}
#empty p{font-size:14px;line-height:1.9}

/* ------- add button ------- */
#addBtn{
  position:fixed;right:20px;bottom:calc(24px + env(safe-area-inset-bottom));z-index:8;
  width:60px;height:60px;border:none;border-radius:50%;
  background:radial-gradient(circle at 32% 28%,#ff8d84,var(--red) 55%,var(--red-deep));
  color:#fff;font-size:32px;line-height:1;font-weight:500;cursor:pointer;
  box-shadow:0 6px 16px rgba(180,40,40,.4);
  transition:transform .15s ease;
}
#addBtn:active{transform:scale(.9)}

/* ------- hint ------- */
#hint{
  position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));
  transform:translateX(-50%);z-index:4;
  font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap;
}

/* ------- sheet ------- */
#veil{position:fixed;inset:0;background:rgba(20,40,60,.35);z-index:9;
  opacity:0;pointer-events:none;transition:opacity .25s ease}
#veil.show{opacity:1;pointer-events:auto}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  background:var(--paper);border-radius:22px 22px 0 0;
  padding:20px 22px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .3s cubic-bezier(.2,.8,.25,1);
  box-shadow:0 -8px 30px rgba(20,50,80,.2);
  max-width:520px;margin:0 auto;color:#274357;
}
#sheet.show{transform:translateY(0)}
#sheet h2{font-size:16px;margin-bottom:14px}
#sheet label{display:block;font-size:12px;font-weight:700;color:#7b93a5;margin:14px 0 6px}
#sheet input[type=text],#sheet input[type=date]{
  width:100%;border:2px solid #dbe7ef;border-radius:12px;padding:11px 12px;
  font-size:16px;font-family:inherit;background:#f7fbfd;color:inherit;outline:none;
}
#sheet input:focus{border-color:var(--red)}
.sizes{display:flex;gap:10px}
.sizes button{
  flex:1;border:2px solid #dbe7ef;background:#f7fbfd;border-radius:14px;
  padding:10px 0 6px;cursor:pointer;font-family:inherit;font-weight:700;
  font-size:11px;color:#7b93a5;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.sizes button i{display:block;border-radius:50%;background:radial-gradient(circle at 32% 28%,#ff9a92,var(--red));}
.sizes button:nth-child(1) i{width:18px;height:21px}
.sizes button:nth-child(2) i{width:26px;height:30px}
.sizes button:nth-child(3) i{width:36px;height:42px}
.sizes button.sel{border-color:var(--red);color:var(--red);background:#fff2f1}
.rowflex{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.rowflex .lbl{font-size:14px;font-weight:700}
.rowflex .sub{font-size:11px;color:#7b93a5}
.toggle{position:relative;width:52px;height:30px;flex:none}
.toggle input{opacity:0;width:100%;height:100%;position:absolute;cursor:pointer;z-index:1}
.toggle span{position:absolute;inset:0;background:#dbe7ef;border-radius:99px;transition:.2s}
.toggle span::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle input:checked+span{background:var(--sun)}
.toggle input:checked+span::after{left:25px}
#dueRow.off{display:none}
#saveBtn{
  width:100%;margin-top:20px;border:none;border-radius:14px;padding:14px;
  background:var(--red);color:#fff;font-size:16px;font-weight:700;font-family:inherit;
  cursor:pointer;box-shadow:0 4px 12px rgba(200,50,50,.3);
}
#saveBtn:active{transform:scale(.98)}
#delBtn{
  width:100%;margin-top:10px;border:none;border-radius:14px;padding:12px;
  background:none;color:#c22f2c;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  display:none;
}
#logoutVeil{position:fixed;inset:0;background:rgba(20,40,60,.35);z-index:13;
  opacity:0;pointer-events:none;transition:opacity .22s ease}
#logoutVeil.show{opacity:1;pointer-events:auto}
#logoutDialog{
  position:fixed;left:50%;top:50%;z-index:14;
  width:min(340px,calc(100vw - 36px));border-radius:18px;padding:18px;
  background:#fff;color:#274357;box-shadow:0 18px 42px rgba(20,50,80,.28);
  transform:translate(-50%,-46%) scale(.96);opacity:0;pointer-events:none;
  transition:opacity .22s ease,transform .22s ease;
}
#logoutDialog.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#logoutDialog h2{font-size:17px;margin-bottom:8px}
#logoutDialog p{font-size:13px;font-weight:700;line-height:1.7;color:#7b93a5}

<script src="./firebase-config.js"></script>
<script>
'use strict';
/* ---------- storage (localStorage、使えない環境ではメモリに退避) ---------- */
const mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)? mem[k] : null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};
const KEY = 'fusen.tasks.v1';
const META_KEY = 'fusen.meta.v1';
const BACKUP_KEY_PREFIX = 'fusen.tasks.backup.';

/* ---------- state ---------- */
let tasks = readLocalTasks();
let meta = readLocalMeta();
let editingId = null;
let lastPopped = null;
let popTimer = null;
let curDay = todayStr();

function readLocalTasks(){
  try{ return normalizeTasks(JSON.parse(store.get(KEY) || '[]')); }catch(e){ return []; }
}
function writeLocalTasks(nextTasks){
  store.set(KEY, JSON.stringify(normalizeTasks(nextTasks)));
}
function readLocalMeta(){
  try{ return normalizeMeta(JSON.parse(store.get(META_KEY) || '{}')); }catch(e){ return normalizeMeta({}); }
}
function writeLocalMeta(nextMeta){
  store.set(META_KEY, JSON.stringify(normalizeMeta(nextMeta)));
}
function normalizeTasks(value){
  if(!Array.isArray(value)) return [];
  return value
    .filter(t => t && typeof t === 'object' && typeof t.id === 'string')
    .map(t => ({
      id: t.id,
      title: String(t.title || '').slice(0, 40),
      imp: [1,2,3].includes(Number(t.imp)) ? Number(t.imp) : 2,
      daily: !!t.daily,
      due: t.due || null,
      done: !!t.done,
      doneOn: t.doneOn || null,
      createdAt: Number(t.createdAt) || Date.now(),
      completedAt: t.completedAt || null
    }));
}
function normalizeMeta(value){
  const src = value && typeof value === 'object' ? value : {};
  const achievements = src.achievements && typeof src.achievements === 'object' ? src.achievements : {};
  const cleanAchievements = {};
  Object.keys(achievements).forEach(id => {
    if(achievements[id]) cleanAchievements[id] = achievements[id];
  });
  return {
    totalPops: Math.max(0, Number(src.totalPops) || 0),
    bigPops: Math.max(0, Number(src.bigPops) || 0),
    dailyPops: Math.max(0, Number(src.dailyPops) || 0),
    overduePops: Math.max(0, Number(src.overduePops) || 0),
    cleanSkyPops: Math.max(0, Number(src.cleanSkyPops) || 0),
    quickPops: Math.max(0, Number(src.quickPops) || 0),
    stalePops: Math.max(0, Number(src.stalePops) || 0),
    dueTodayPops: Math.max(0, Number(src.dueTodayPops) || 0),
    noDuePops: Math.max(0, Number(src.noDuePops) || 0),
    smallPops: Math.max(0, Number(src.smallPops) || 0),
    crowdedRejects: Math.max(0, Number(src.crowdedRejects) || 0),
    streakDays: Math.max(0, Number(src.streakDays) || 0),
    lastPopDate: src.lastPopDate || null,
    timePops: {
      morning: Math.max(0, Number(src.timePops && src.timePops.morning) || 0),
      noon: Math.max(0, Number(src.timePops && src.timePops.noon) || 0),
      night: Math.max(0, Number(src.timePops && src.timePops.night) || 0),
      midnight: Math.max(0, Number(src.timePops && src.timePops.midnight) || 0)
    },
    achievements: cleanAchievements
  };
}
function sameTasks(a, b){
  return JSON.stringify(normalizeTasks(a)) === JSON.stringify(normalizeTasks(b));
}
function backupLocalTasks(){
  if(!tasks.length) return;
  store.set(BACKUP_KEY_PREFIX + Date.now(), JSON.stringify(tasks));
}
function save(){
  tasks = normalizeTasks(tasks);
  meta = normalizeMeta(meta);
  writeLocalTasks(tasks);
  writeLocalMeta(meta);
  queueRemoteSave();
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------- optional Firebase sync ---------- */
const syncBtn = document.getElementById('syncBtn');
const loginNudge = document.getElementById('loginNudge');
const logoutVeil = document.getElementById('logoutVeil');
const logoutDialog = document.getElementById('logoutDialog');
const syncState = {
  configured: false,
  modules: null,
  auth: null,
  db: null,
  provider: null,
  user: null,
  unsub: null,
  saveTimer: null,
  applyingRemote: false,
  initialSnapshotHandled: false
};

function firebaseConfig(){
  return window.FUSEN_FIREBASE_CONFIG || null;
}
function hasFirebaseConfig(){
  const c = firebaseConfig();
  return !!(c && c.apiKey && c.authDomain && c.projectId && c.appId);
}
function setSyncStatus(label, mode){
  syncBtn.textContent = label;
  syncBtn.className = 'sync-btn ' + (mode || 'local');
  if(syncState.user) syncBtn.title = 'Google同期からログアウト';
  else if(syncState.configured) syncBtn.title = 'Googleでログインして同期';
  else syncBtn.title = 'firebase-config.js を設定すると同期できます';
}
function updateLoginNudge(){
  loginNudge.classList.toggle('show', syncState.configured && !syncState.user);
}
function openLogoutDialog(){
  logoutVeil.classList.add('show');
  logoutDialog.classList.add('show');
}
function closeLogoutDialog(){
  logoutVeil.classList.remove('show');
  logoutDialog.classList.remove('show');
}
function queueRemoteSave(){
  if(syncState.applyingRemote || !syncState.user || !syncState.db || !syncState.modules) return;
  clearTimeout(syncState.saveTimer);
  setSyncStatus('同期中', 'busy');
  syncState.saveTimer = setTimeout(pushTasksNow, 350);
}
async function pushTasksNow(){
  if(syncState.applyingRemote || !syncState.user || !syncState.db || !syncState.modules) return;
  const { doc, setDoc, serverTimestamp } = syncState.modules;
  const ref = doc(syncState.db, 'users', syncState.user.uid, 'state', 'tasks');
  try{
    await setDoc(ref, {
      tasks: normalizeTasks(tasks),
      meta: normalizeMeta(meta),
      updatedAt: serverTimestamp(),
      updatedAtMs: Date.now()
    }, { merge: true });
    setSyncStatus('同期済み', 'ready');
  }catch(e){
    console.error(e);
    setSyncStatus('同期エラー', 'error');
  }
}
function applyRemoteState(data){
  syncState.applyingRemote = true;
  tasks = normalizeTasks(data && data.tasks);
  if(data && data.meta) meta = normalizeMeta(data.meta);
  writeLocalTasks(tasks);
  writeLocalMeta(meta);
  syncState.applyingRemote = false;
  render();
}
function attachUser(user){
  const { doc, onSnapshot } = syncState.modules;
  if(syncState.unsub) syncState.unsub();
  syncState.user = user;
  syncState.initialSnapshotHandled = false;
  updateLoginNudge();
  setSyncStatus('同期中', 'busy');

  const ref = doc(syncState.db, 'users', user.uid, 'state', 'tasks');
  syncState.unsub = onSnapshot(ref, snap => {
    if(!syncState.initialSnapshotHandled){
      syncState.initialSnapshotHandled = true;
      if(snap.exists()){
        const remoteData = snap.data();
        const remoteTasks = normalizeTasks(remoteData.tasks);
        if(tasks.length && !sameTasks(tasks, remoteTasks)) backupLocalTasks();
        applyRemoteState(remoteData);
        if(!remoteData.meta) pushTasksNow();
        setSyncStatus('同期済み', 'ready');
      }else if(tasks.length){
        pushTasksNow();
      }else{
        setSyncStatus('同期済み', 'ready');
      }
      return;
    }
    if(snap.exists()){
      applyRemoteState(snap.data());
      setSyncStatus('同期済み', 'ready');
    }
  }, e => {
    console.error(e);
    setSyncStatus('同期エラー', 'error');
  });
}
function detachUser(){
  if(syncState.unsub) syncState.unsub();
  syncState.unsub = null;
  syncState.user = null;
  setSyncStatus('同期する', 'ready');
  updateLoginNudge();
}
async function signInForSync(){
  if(!syncState.configured){
    alert('同期を使うには firebase-config.js に Firebase の設定値を入れてください。未設定でもこの端末には保存されます。');
    return;
  }
  if(!syncState.modules || !syncState.auth || !syncState.provider){
    setSyncStatus('準備中', 'busy');
    return;
  }
  const { signInWithPopup, signInWithRedirect } = syncState.modules;
  try{
    await signInWithPopup(syncState.auth, syncState.provider);
  }catch(e){
    if(e && (e.code === 'auth/popup-blocked' || e.code === 'auth/operation-not-supported-in-this-environment')){
      await signInWithRedirect(syncState.auth, syncState.provider);
      return;
    }
    console.error(e);
    setSyncStatus('ログイン失敗', 'error');
  }
}
async function initFirebaseSync(){
  syncState.configured = hasFirebaseConfig();
  if(!syncState.configured){
    setSyncStatus('ローカル', 'local');
    updateLoginNudge();
    return;
  }
  setSyncStatus('確認中', 'busy');
  try{
    const [appMod, authMod, fireMod] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js')
    ]);
    const app = appMod.initializeApp(firebaseConfig());
    let db;
    try{
      db = fireMod.initializeFirestore(app, {
        localCache: fireMod.persistentLocalCache({
          tabManager: fireMod.persistentMultipleTabManager()
        })
      });
    }catch(e){
      db = fireMod.getFirestore(app);
    }

    syncState.auth = authMod.getAuth(app);
    syncState.db = db;
    syncState.provider = new authMod.GoogleAuthProvider();
    syncState.modules = {
      doc: fireMod.doc,
      setDoc: fireMod.setDoc,
      onSnapshot: fireMod.onSnapshot,
      serverTimestamp: fireMod.serverTimestamp,
      signInWithPopup: authMod.signInWithPopup,
      signInWithRedirect: authMod.signInWithRedirect,
      signOut: authMod.signOut
    };
    authMod.onAuthStateChanged(syncState.auth, user => user ? attachUser(user) : detachUser());
  }catch(e){
    console.error(e);
    setSyncStatus('同期不可', 'error');
  }
}
syncBtn.addEventListener('click', async () => {
  if(syncState.user && syncState.modules){
    openLogoutDialog();
    return;
  }
  signInForSync();
});
document.getElementById('loginNudgeBtn').addEventListener('click', signInForSync);
document.getElementById('logoutCancelBtn').addEventListener('click', closeLogoutDialog);
logoutVeil.addEventListener('click', closeLogoutDialog);
document.getElementById('logoutConfirmBtn').addEventListener('click', async () => {
  if(syncState.user && syncState.modules) await syncState.modules.signOut(syncState.auth);
  closeLogoutDialog();
});

/* ---------- sky / time of day ---------- */
function applySky(){
  const h = new Date().getHours();
  document.body.classList.remove('dawn','dusk','night');
  if(h >= 20 || h < 5) document.body.classList.add('night');
  else if(h < 8) document.body.classList.add('dawn');
  else if(h >= 16 && h < 19) document.body.classList.add('dusk');
}

/* ---------- clouds ---------- */
function makeClouds(){
  for(let i=0;i<4;i++){
    const c = document.createElement('div');
    c.className = 'cloud';
    const s = 60 + Math.random()*70;
    c.style.top = (5 + Math.random()*55) + '%';
    c.style.width = s*2.4+'px'; c.style.height = s+'px';
    c.style.animation = `drift ${70+Math.random()*70}s linear ${-Math.random()*80}s infinite`;
    c.innerHTML = `<i style="width:${s*1.4}px;height:${s*.9}px;left:0;bottom:0"></i>
      <i style="width:${s}px;height:${s}px;left:${s*.7}px;bottom:${s*.15}px"></i>
      <i style="width:${s*1.1}px;height:${s*.7}px;left:${s*1.3}px;bottom:0"></i>`;
    document.body.appendChild(c);
  }
}

/* ---------- balloon sizing ---------- */
function daysLeft(due){
  const [y,m,d] = due.split('-').map(Number);
  const t = new Date(); 
  const a = new Date(y, m-1, d);
  const b = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  return Math.round((a - b) / 86400000);
}
function diameter(task){
  const wide = window.innerWidth > 900;
  const base = [0, 82, 108, 136][task.imp] * (wide ? 1.28 : 1);
  let mul = 1;
  if(!task.daily && task.due){
    const dl = daysLeft(task.due);
    if(dl <= 0) mul = 1.65;
    else if(dl >= 8) mul = 1;
    else mul = 1 + (8 - dl) * 0.08;   // 8日前から徐々に膨らむ
  }
  const cap = Math.min(window.innerWidth, 500) * 0.42;
  return Math.min(base * mul, Math.max(cap, 120));
}
function dueLabel(task){
  if(task.daily) return '🌞 毎日';
  if(!task.due) return '';
  const dl = daysLeft(task.due);
  if(dl < 0) return Math.abs(dl) + '日すぎてる！';
  if(dl === 0) return 'きょうまで！';
  if(dl === 1) return 'あした';
  return 'あと' + dl + '日';
}

/* ---------- render ---------- */
const sky = document.getElementById('sky');
let physicsFrame = null;
let physicsBodies = [];

function stopBalloonPhysics(){
  if(physicsFrame) cancelAnimationFrame(physicsFrame);
  physicsFrame = null;
  physicsBodies = [];
}
function visibleTasks(){
  const t = todayStr();
  return tasks.filter(x => x.daily ? x.doneOn !== t : !x.done);
}
function render(){
  stopBalloonPhysics();
  sky.innerHTML = '';
  const vis = visibleTasks();
  document.getElementById('empty').style.display = vis.length ? 'none' : 'flex';
  document.getElementById('hint').style.display = vis.length ? 'block' : 'none';

  const d = new Date();
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('hdrDate').textContent = `${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
  document.getElementById('hdrCount').innerHTML = vis.length ? `のこり<b>${vis.length}</b>個` : '';

  const items = vis.map(task => {
    const el = buildBalloon(task);
    sky.appendChild(el);
    return { el, d: diameter(task) };
  });
  layout(items);
}
function buildBalloon(task){
  const d = diameter(task);
  const el = document.createElement('div');
  el.className = 'balloon';
  const overdue = !task.daily && task.due && daysLeft(task.due) < 0;
  if(overdue) el.classList.add('overdue');
  if(task.daily){
    el.style.setProperty('--hl','#ffe0a3');
    el.style.setProperty('--c1','var(--sun)');
    el.style.setProperty('--c2','var(--sun-deep)');
  }else{
    el.style.setProperty('--hl','#ff9a92');
    el.style.setProperty('--c1', overdue ? 'var(--red-deep)' : 'var(--red)');
    el.style.setProperty('--c2', overdue ? 'var(--red-dark)' : 'var(--red-deep)');
  }
  el.style.setProperty('--d', d);
  el.style.setProperty('--dur', (2.6 + Math.random()*2.2).toFixed(2) + 's');
  el.style.setProperty('--delay', (-Math.random()*3).toFixed(2) + 's');
  el.innerHTML = `
    <div class="body"><span class="title"></span></div>
    <svg class="string" viewBox="0 0 22 60"><path d="M11 0 C 4 15, 18 30, 11 45 C 8 52, 12 56, 11 60"/></svg>
    <div class="due">${dueLabel(task)}</div>`;
  el.querySelector('.title').textContent = task.title;

  /* tap = pop / long-press = edit */
  let pressTimer = null, longPressed = false, sx=0, sy=0;
  el.addEventListener('pointerdown', e => {
    longPressed = false; sx = e.clientX; sy = e.clientY;
    pressTimer = setTimeout(() => { longPressed = true; openSheet(task.id); }, 520);
  });
  el.addEventListener('pointermove', e => {
    if(Math.hypot(e.clientX-sx, e.clientY-sy) > 12) clearTimeout(pressTimer);
  });
  el.addEventListener('pointerup', () => clearTimeout(pressTimer));
  el.addEventListener('pointercancel', () => clearTimeout(pressTimer));
  el.addEventListener('click', () => { if(!longPressed) pop(task, el); });
  el.addEventListener('contextmenu', e => e.preventDefault());
  return el;
}

/* ---------- layout: なるべく重ならないように配置 ---------- */
function layout(items){
  const W = sky.clientWidth, H = sky.clientHeight;
  const topPad = 70, botPad = 130;
  const placed = [];
  items.sort((a,b) => b.d - a.d);
  for(const it of items){
    const r = it.d * 0.52;
    const xMin = r + 6, xMax = W - r - 6;
    const yMin = topPad + r, yMax = Math.max(yMin + 1, H - botPad - r * 1.4);
    let best = null;
    for(let i=0;i<70;i++){
      const x = xMin + Math.random() * Math.max(1, xMax - xMin);
      const y = yMin + Math.random() * Math.max(1, yMax - yMin);
      let ok = true, worst = Infinity;
      for(const p of placed){
        const gap = Math.hypot(x-p.x, y-p.y) - (r + p.r) * 0.9;
        if(gap < 0){ ok = false; worst = Math.min(worst, gap); }
      }
      if(ok){ best = {x, y, s: 0}; break; }
      if(!best || worst > best.s) best = {x, y, s: worst};
    }
    const body = {
      el: it.el,
      x: best.x,
      y: best.y,
      r,
      vx: (Math.random() - .5) * .34,
      vy: (Math.random() - .5) * .22,
      mass: r * r,
      phase: Math.random() * Math.PI * 2
    };
    placed.push(body);
    it.el.style.left = best.x + 'px';
    it.el.style.top  = best.y + 'px';
  }
  startBalloonPhysics(placed);
}
function startBalloonPhysics(bodies){
  physicsBodies = bodies;
  if(!physicsBodies.length) return;
  let last = performance.now();
  const tick = now => {
    const dt = Math.min(2, Math.max(.5, (now - last) / 16.67));
    last = now;
    physicsBodies = physicsBodies.filter(b => b.el.isConnected);
    if(!physicsBodies.length){ physicsFrame = null; return; }

    const W = sky.clientWidth, H = sky.clientHeight;
    const topPad = 70, botPad = 130;
    for(const b of physicsBodies){
      const wind = Math.sin(now * .00035 + b.phase) * .006;
      const float = Math.cos(now * .00042 + b.phase) * .004 - .0015;
      b.vx = (b.vx + wind * dt) * .992;
      b.vy = (b.vy + float * dt) * .992;
      const speed = Math.hypot(b.vx, b.vy);
      const maxSpeed = .72;
      if(speed > maxSpeed){
        b.vx = b.vx / speed * maxSpeed;
        b.vy = b.vy / speed * maxSpeed;
      }
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      const minX = b.r + 6, maxX = W - b.r - 6;
      const minY = topPad + b.r, maxY = Math.max(minY, H - botPad - b.r * 1.28);
      if(b.x < minX){ b.x = minX; b.vx = Math.abs(b.vx) * .76; }
      if(b.x > maxX){ b.x = maxX; b.vx = -Math.abs(b.vx) * .76; }
      if(b.y < minY){ b.y = minY; b.vy = Math.abs(b.vy) * .72; }
      if(b.y > maxY){ b.y = maxY; b.vy = -Math.abs(b.vy) * .72; }
    }

    for(let i=0;i<physicsBodies.length;i++){
      for(let j=i+1;j<physicsBodies.length;j++){
        const a = physicsBodies[i], b = physicsBodies[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy) || .001;
        const minDist = (a.r + b.r) * .86;
        if(dist >= minDist) continue;
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        const invA = 1 / a.mass, invB = 1 / b.mass;
        const invSum = invA + invB;
        a.x -= nx * overlap * (invA / invSum) * .82;
        a.y -= ny * overlap * (invA / invSum) * .82;
        b.x += nx * overlap * (invB / invSum) * .82;
        b.y += ny * overlap * (invB / invSum) * .82;

        const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
        const closing = rvx * nx + rvy * ny;
        if(closing < .06){
          const impulse = (-(1.22) * closing + .018) / invSum;
          a.vx -= impulse * invA * nx;
          a.vy -= impulse * invA * ny;
          b.vx += impulse * invB * nx;
          b.vy += impulse * invB * ny;
        }
      }
    }

    for(const b of physicsBodies){
      b.el.style.left = b.x.toFixed(1) + 'px';
      b.el.style.top = b.y.toFixed(1) + 'px';
    }
    physicsFrame = requestAnimationFrame(tick);
  };
  physicsFrame = requestAnimationFrame(tick);
}

let audioCtx = null;

function ensureAudio(){
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, dur, type, volume, dest){
  const ctx = ensureAudio();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, start);
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(volume, start + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  o.connect(g).connect(dest || ctx.destination);
  o.start(start);
  o.stop(start + dur + 0.03);
}
function popSound(power){
  try{
    const ctx = ensureAudio();
    const t = ctx.currentTime;
    const burst = Math.min(1.45, 0.75 + power * 0.22);
    // 高めの「ぱあん！」: 短いノイズを上側へ寄せる
    const len = ctx.sampleRate * 0.075;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const ch = buf.getChannelData(0);
    for(let i=0;i<len;i++) ch[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.7);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 1200 + power * 260;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 2300 + power * 420; bp.Q.value = 1.4;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.42 * burst, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    src.connect(hp).connect(bp).connect(g).connect(ctx.destination);
    src.start(t);

    // お祝いのベルを少しだけ足す
    const notes = [1175, 1480, 1760, 2349];
    notes.forEach((n, i) => playTone(n, t + 0.035 + i * 0.035, 0.16, 'triangle', 0.045 + power * 0.012));
    playTone(880 + power * 80, t, 0.11, 'sine', 0.035 + power * 0.01);
  }catch(e){}
}
function playUnlockSound(){
  try{
    const ctx = ensureAudio();
    const t = ctx.currentTime;
    [1047, 1319, 1568, 2093].forEach((n, i) => playTone(n, t + i * 0.055, 0.22, 'triangle', 0.052));
  }catch(e){}
}

function timeBand(hour){
  if(hour >= 5 && hour < 11) return 'morning';

}

function wouldOverfillSky(candidate){
  const all = visibleTasks().concat(candidate);
  const W = sky.clientWidth || window.innerWidth;
  const H = sky.clientHeight || window.innerHeight;
  const usable = Math.max(1, W * Math.max(1, H - 200));
  const load = all.reduce((sum, task) => {
    const r = diameter(task) * .52;
    return sum + Math.PI * r * r;
  }, 0) / usable;
  const narrow = W < 700;
  const countLimit = narrow ? 18 : 38;
  const loadLimit = narrow ? .5 : .42;
  return all.length > countLimit || load > loadLimit;
}

}

function pop(task, el){
  if((task.daily && task.doneOn === todayStr()) || (!task.daily && task.done)) return;
  if(navigator.vibrate) navigator.vibrate(35);
  const d = diameter(task);
  const now = Date.now();
  const ageMs = now - (Number(task.createdAt) || now);
  const dueDelta = !task.daily && task.due ? daysLeft(task.due) : null;
  const willBeOverdue = dueDelta !== null && dueDelta < 0;
  const willBeDueToday = dueDelta === 0;
  const band = timeBand(new Date().getHours());
  const x = el.offsetLeft, y = el.offsetTop;
  const power = celebrationPower(task, d, false);
  popSound(power);
  burstConfetti(x, y, power);

  // 破片
  const c2 = getComputedStyle(el).getPropertyValue('--c1') || 'var(--red)';
  const words = ['ぱあん！','お祝い！','完了！','やった！','ナイス！','すっきり！'];
  const w = document.createElement('div');
  w.className = 'popword'; w.textContent = words[Math.floor(Math.random()*words.length)];
  w.style.left = x+'px'; w.style.top = y+'px';
  sky.appendChild(w); setTimeout(()=>w.remove(), 650);
  for(let i=0;i<10 + power * 4;i++){
    const f = document.createElement('div');
    f.className = 'frag';
    f.style.background = i%3 ? c2 : '#fff';
    f.style.left = x+'px'; f.style.top = y+'px';
    sky.appendChild(f);
    const ang = Math.random()*Math.PI*2, dist = 50 + Math.random()*(85 + power * 18);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      f.style.transform = `translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist + 30}px) rotate(${Math.random()*360}deg) scale(.3)`;
      f.style.opacity = '0';
    }));
    setTimeout(()=>f.remove(), 620);
  }
  el.remove();

  // 完了マーク
  task.completedAt = new Date(now).toISOString();
  if(task.daily) task.doneOn = todayStr();
  else task.done = true;
  const cleanSky = visibleTasks().length === 0;
  if(cleanSky) burstConfetti(x, y, Math.min(5, power + 1));
  recordPopStats(task, {
    overdue: willBeOverdue,
    dueToday: willBeDueToday,
    noDue: !task.daily && !task.due,
    quick: ageMs <= 60000,
    stale: ageMs >= 30 * 86400000,
    cleanSky,
    band
  });
  save();

  // undo トースト
  lastPopped = task;
  document.getElementById('toastText').textContent = `「${task.title}」完了！`;
  const toast = document.getElementById('toast');
  toast.classList.remove('notice');
  document.getElementById('undoBtn').style.display = '';
  toast.classList.add('show');
  clearTimeout(popTimer);
  popTimer = setTimeout(() => { toast.classList.remove('show'); lastPopped = null; render(); }, 4500);

  // 数だけ即更新（レイアウトは動かさない）
  const vis = visibleTasks();
  document.getElementById('hdrCount').innerHTML = vis.length ? `のこり<b>${vis.length}</b>個` : '';
  document.getElementById('empty').style.display = (vis.length || lastPopped) ? 'none' : 'flex';
}

  if(lastPopped){
    if(lastPopped.daily) lastPopped.doneOn = null;
    else lastPopped.done = false;
    lastPopped.completedAt = null;

  }

  document.getElementById('toast').classList.remove('show');

    tasks.push(nextTask);
  }
  save(); closeSheet(); render();
});
document.getElementById('delBtn').addEventListener('click', () => {
  tasks = tasks.filter(x => x.id !== editingId);
  save(); closeSheet(); render();
});

/* ---------- 日付またぎ・時間帯の更新 ---------- */
setInterval(() => {
  applySky();
  if(todayStr() !== curDay){ curDay = todayStr(); render(); }  // 毎日タスク復活
}, 60000);
document.addEventListener('visibilitychange', () => {
  if(!document.hidden){
    applySky();
    if(todayStr() !== curDay){ curDay = todayStr(); }
    render();
  }
});

/* ---------- PWA ---------- */
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn(e));
  });
}

/* ---------- start ---------- */
applySky();
makeClouds();
render();
initFirebaseSync();
</script>
